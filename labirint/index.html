<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <h1>Лабиринт</h1>

  <div class="controls">
    <label>
      Скорость: <strong id="speedVal">6</strong>
      <input type="range" id="speedSlider" min="1" max="10" value="6"/>
    </label>
    <input type="file" id="fileInput" accept=".json" style="display:none"/>
    <button id="btnLoad">Загрузить JSON</button>
    <button id="btnBFS" disabled>Найти путь</button>
    <button id="btnReset" disabled>Сбросить</button>
  </div>

  <canvas id="mazeCanvas"></canvas>

  <div id="status"></div>

  <script src="main.js"></script>
</body>
</html>
